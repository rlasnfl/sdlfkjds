<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>보이스챗 보이스피싱 위험도 미리보기</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>보이스챗 보이스피싱 위험도 미리보기</h1>
  </header>

  <main class="container">
    <!-- Left column: controls and transcript -->
    <section class="card controls">
      <h2>음성 인식</h2>
      <div class="buttons">
        <button id="startBtn" class="btn primary">음성 입력 시작</button>
        <button id="stopBtn" class="btn" disabled>음성 인식 종료</button>
      </div>

      <div class="status">
        <span id="listeningIndicator" class="dot off">●</span>
        <span id="statusText">대기 중</span>
      </div>

      <div class="transcript">
        <h3>실시간 텍스트</h3>
        <div id="transcriptOutput" class="transcriptOutput" aria-live="polite"></div>
      </div>

      <div class="analysis">
        <h3>분석 결과</h3>
        <div class="scoreRow">
          <div class="scoreBox">
            <div class="scoreLabel">위험 점수</div>
            <div id="scoreValue" class="scoreValue">0</div>
          </div>
          <div class="riskText" id="riskText">보이스피싱 가능성이 낮습니다</div>
        </div>

        <div class="gaugeWrap">
          <div class="gauge" aria-hidden="true">
            <div id="gaugeFill" class="gaugeFill"></div>
          </div>
          <div class="gaugePercent" id="gaugePercent">0%</div>
        </div>

        <div id="warningMsg" class="warningMsg" aria-live="assertive"></div>

        <div class="ttsRow">
          <button id="speakBtn" class="btn">결과 음성 듣기</button>
        </div>
      </div>
    </section>

    <!-- Right column: chart and keyword list -->
    <section class="card chartCard">
      <h2>위험 항목 그래프</h2>
      <canvas id="riskChart" height="220"></canvas>

      <div class="keywords">
        <h3>감지된 위험 키워드</h3>
        <ul id="keywordList" class="keywordList"></ul>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small>웹 Speech API 및 Chart.js를 사용한 데모입니다. 최신 Chrome 권장.</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
